name: VS Code Extension CI

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/vscode-extension-ci.yml
      - .github/workflows/vscode-extension-release.yml
      - apps/vscode-extension/**
      - package.json
      - packages/tsconfigs/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  push:
    branches:
      - master
    paths:
      - .github/workflows/vscode-extension-ci.yml
      - .github/workflows/vscode-extension-release.yml
      - apps/vscode-extension/**
      - package.json
      - packages/tsconfigs/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vscode-extension-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/vscode-extension/package.json', 'utf8')).version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file=vibe-forge-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "archive=apps/vscode-extension/vibe-forge-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @vibe-forge/vscode-extension typecheck

      - name: Build extension
        run: pnpm --filter @vibe-forge/vscode-extension build

      - name: Package VSIX
        env:
          ARCHIVE_FILE: ${{ steps.version.outputs.file }}
          VSCODE_EXTENSION_PUBLISHER: localdev
        run: pnpm --filter @vibe-forge/vscode-extension package:vsix -- --out "$ARCHIVE_FILE"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-forge-vscode-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14
